<h1 class="title">problem</h1>
</header>
<p>已知 <span class="math inline">\(f(x)=x^3-4x+1\)</span>, 过点 <span class="math inline">\(A(-2,a)\)</span> 可作 <span class="math inline">\(f\)</span> 的三条切线, 求 <span class="math inline">\(a\)</span> 范围.</p>
<details>
<p><summary>解答</summary></p>
<p><span class="math inline">\((1,9)\)</span>.</p>
<p>根据三次函数切线数量, <span class="math inline">\((-2,a)\)</span> 要在 <span class="math inline">\(f\)</span> 上方, 的同时在对称中心 <span class="math inline">\((0,1)\)</span> 切线 <span class="math inline">\(y=-4x+1\)</span> 的下方. 因此 <span class="math inline">\(1&lt;a&lt;9\)</span></p>
<p>tags: 三次函数, 三次函数切线数量</p>
</details>
