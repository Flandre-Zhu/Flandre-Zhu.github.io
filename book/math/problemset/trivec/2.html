<h1 class="title">problem</h1>
</header>
<p>在 <span class="math inline">\(\Delta ABC\)</span> 中, 若 <span class="math inline">\(\sqrt{3} \sin A (\frac{\cos A}{a}+\frac{\cos C}{c})=\sin B \sin C\)</span>, 且 <span class="math inline">\(\sqrt{3}\sin C+\cos C=2\)</span>, 求 <span class="math inline">\(c\)</span> 的值</p>
<details>
<p><summary>解答</summary></p>
<p><span class="math inline">\(c=2\)</span>. 用正弦定理代换掉 <span class="math inline">\(a,c\)</span>, 再合并一个和角公式, 化简得到 <span class="math inline">\(c\sin C=\sqrt{3}\)</span>. 再用辅助角公式处理第二个式子得到 <span class="math inline">\(C=60^{\circ}\)</span>, 从而 <span class="math inline">\(c=2\)</span></p>
<p>tags: 三角恒等变形</p>
</details>
