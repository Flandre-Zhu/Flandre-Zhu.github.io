<h1 class="title">problem</h1>
</header>
<p>设数列 <span class="math inline">\(\{a_n\}\)</span> 前 <span class="math inline">\(n\)</span> 项和为 <span class="math inline">\(S_n\)</span></p>
<ol type="1">
<li><p>设 <span class="math inline">\(a_1=1\)</span>, 若 <span class="math inline">\(S_n=2a_n-1\)</span>, 求 <span class="math inline">\(\{a_n\}\)</span> 通项</p></li>
<li><p>记 <span class="math inline">\(f_n(x)=1+x+x^2+x^3\ldots+x^n,\)</span> 设 <span class="math inline">\(a_n=f_n&#39;(2),\)</span> 求 <span class="math inline">\(S_n\)</span></p></li>
</ol>
<details>
<p><summary>解答</summary></p>
<ol type="1">
<li><p>显然为 <span class="math inline">\(2^n-1\)</span></p></li>
<li><p>求导即可, 发现它是等差乘等比</p></li>
</ol>
<p>这个题目设置的目的就是为了让同学们感受到, 等差乘等比可以求导做</p>
