<h1 class="title">problem</h1>
</header>
<p>数列 <span class="math inline">\(\{a_n\}\)</span> 满足 <span class="math inline">\(a_2=5,a_{n+1}=2a_n-1\)</span></p>
<ol type="1">
<li><p>证明: 数列 <span class="math inline">\(\{a_n-1\}\)</span> 是等比数列</p></li>
<li><p>求 <span class="math inline">\(\{a_n\}\)</span> 的通项公式</p></li>
<li><p>若 <span class="math inline">\(b_n=\frac{a_n-1}{a_na_{n+1}}\)</span>, 证明: <span class="math inline">\(\sum\limits_{i=1}^{n}b_i &lt; \frac{1}{3}\)</span></p></li>
</ol>
<details>
<p><summary>解答</summary></p>
<ol type="1">
<li>容易 (2) <span class="math inline">\(a_n=2^n+1\)</span> (3) 裂项, <span class="math inline">\(b_n=\frac{1}{a_n}-\frac{1}{a_{n+1}}\)</span></li>
</ol>
<p>tags: 裂项, 复杂裂项</p>
</details>
