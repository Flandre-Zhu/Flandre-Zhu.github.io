<p>定义: 对于函数 <span class="math inline">\(f(x)\)</span>, 若存在常数 <span class="math inline">\(K\)</span> 使得 <span class="math inline">\(\forall x_1,x_2,|f(x_1)-f(x_2)|\le K|x_1-x_2|\)</span>, 则称 <span class="math inline">\(f(x)\)</span> 满足 Lipschitz 条件. 证明: <span class="math inline">\(f(x)=\cos x\)</span> 满足该条件.</p>
<details>
<p><summary>解答</summary></p>
<p>和差化积打开两个 cos 的和, 再用一下 <span class="math inline">\(\sin x&lt;x\)</span> 的性质, 证毕</p>
