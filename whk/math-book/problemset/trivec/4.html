<h1 class="title">problem</h1>
</header>
<p>求和 <span class="math inline">\(\sin x + \sin 2x + \sin 3x + \ldots + \sin nx\)</span>. 提示: 用积化和差公式, 或者复数</p>
<details>
<p><summary>解答</summary></p>
<p><span class="math inline">\(\dfrac{\sin \frac{n+1}{2}x\ \sin \frac{n}{2}x}{\sin \frac{x}{2}}\)</span>.复数就是等比数列求和, 积化和差就考虑乘一个 <span class="math inline">\(\sin \frac{x}{2}\)</span>, 均可得到.</p>
<p>tags: 巧用复数, 三角恒等变形</p>
