<h1 class="title">problem</h1>
</header>
<p>已知 <span class="math inline">\(f(x)=xe^x+\frac{x}{e^x}+1\)</span>, 且 <span class="math inline">\(f(1+a)+f(1-a^2)&gt;2\)</span>, 求 <span class="math inline">\(a\)</span> 取值范围</p>
<details>
<p><summary>解答</summary></p>
<p><span class="math inline">\((-1,2)\)</span> .</p>
<p>注意到 <span class="math inline">\(f(x)=x(e^x+e^{-x})+1\)</span> 关于 <span class="math inline">\((0,1)\)</span> 中心对称且递增, 问题等价于 <span class="math inline">\((1+a)+(1-a^2)&gt;0\)</span>, 解得 <span class="math inline">\(a\in (-1,2)\)</span></p>
<p>tags: 隐藏奇偶性, 问题的转化</p>
</details>
