<h1 class="title">problem</h1>
</header>
<p>已知函数 <span class="math inline">\(f(x)=\frac{1}{3}x^3+ax^2-3a^2x(a\in R)\)</span>, 则 <span class="math inline">\(f(2a-1)\le f(a)\)</span> 的解集为?</p>
<details>
<p><summary>解答</summary></p>
<p><span class="math inline">\((-\infty, \frac{1}{7})\cup \{1\}\)</span>.</p>
<p><span class="math inline">\(1\)</span> 特殊处理, 然后就是发现 <span class="math inline">\(f\)</span> 的两个极值点为 <span class="math inline">\(a\)</span> 和 <span class="math inline">\(-3a\)</span>. 利用三次函数的五点, 将这个不等式转为 <span class="math inline">\(a\)</span> 的一次不等式, 变为 <span class="math inline">\(2a-1&lt;-5a\)</span>, 也就是 <span class="math inline">\(a&lt;\frac{1}{7}\)</span></p>
<p>tags: 三次函数, 三次函数的五点</p>
</details>
